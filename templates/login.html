<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPL Auction 2024 — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #FFD700;
    --gold-dark: #B8860B;
    --crimson: #C8102E;
    --navy: #003366;
    --bg: #080C18;
    --surface: #0E1525;
    --border: rgba(255,215,0,0.2);
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    overflow-y: auto;
    position: relative;
  }

  /* Stadium light rays */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 0%, rgba(200,16,46,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 0%, rgba(255,215,0,0.1) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 50% 100%, rgba(0,51,102,0.4) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Animated grid lines */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,215,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,215,0,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridMove 20s linear infinite;
    z-index: 0;
  }

  @keyframes gridMove { from { transform: translateY(0); } to { transform: translateY(60px); } }

  .login-wrap {
    position: relative; z-index: 1;
    width: 100%; max-width: 480px;
    padding: 20px;
  }

  .logo-block {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo-ipl {
    font-family: 'Orbitron', sans-serif;
    font-size: 72px;
    font-weight: 900;
    background: linear-gradient(135deg, #FFD700 0%, #FFF8DC 40%, #B8860B 70%, #FFD700 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: none;
    line-height: 1;
    letter-spacing: 6px;
    filter: drop-shadow(0 0 30px rgba(255,215,0,0.4));
    animation: pulse 3s ease-in-out infinite alternate;
  }

  @keyframes pulse {
    from { filter: drop-shadow(0 0 20px rgba(255,215,0,0.3)); }
    to   { filter: drop-shadow(0 0 50px rgba(255,215,0,0.7)); }
  }

  .logo-sub {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 8px;
    color: var(--crimson);
    margin-top: 4px;
  }

  .logo-year {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    letter-spacing: 4px;
    color: rgba(255,215,0,0.5);
    margin-top: 6px;
  }

  .card {
    background: linear-gradient(145deg, rgba(14,21,37,0.95), rgba(8,12,24,0.98));
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    backdrop-filter: blur(20px);
    box-shadow:
      0 0 0 1px rgba(255,215,0,0.05),
      0 20px 60px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,215,0,0.1);
    animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    color: var(--gold);
    text-align: center;
    margin-bottom: 32px;
  }

  .form-group { margin-bottom: 20px; }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,215,0,0.6);
    margin-bottom: 8px;
    font-weight: 600;
  }

  input[type="text"] {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 8px;
    padding: 14px 16px;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 500;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  input[type="text"]:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(255,215,0,0.1);
  }

  input[type="text"]::placeholder { color: rgba(255,255,255,0.2); }

  .role-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }

  .role-option { position: relative; }

  .role-option input { position: absolute; opacity: 0; width: 0; height: 0; }

  .role-label {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px 16px;
    border: 2px solid rgba(255,215,0,0.15);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s;
    background: rgba(255,255,255,0.02);
    gap: 8px;
  }

  .role-label .icon {
    font-size: 28px;
    line-height: 1;
  }

  .role-label .role-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.7);
    transition: color 0.3s;
  }

  .role-label .role-desc {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    text-align: center;
    line-height: 1.3;
  }

  .role-option input:checked + .role-label {
    border-color: var(--gold);
    background: rgba(255,215,0,0.08);
    box-shadow: 0 0 20px rgba(255,215,0,0.15), inset 0 0 20px rgba(255,215,0,0.05);
  }

  .role-option input:checked + .role-label .role-name { color: var(--gold); }

  .btn-enter {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #B8860B, #FFD700, #B8860B);
    background-size: 200% 100%;
    border: none;
    border-radius: 8px;
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 4px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .btn-enter::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }

  .btn-enter:hover { background-position: right center; box-shadow: 0 0 30px rgba(255,215,0,0.4); }
  .btn-enter:hover::before { transform: translateX(100%); }
  .btn-enter:active { transform: scale(0.98); }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 24px;
    color: rgba(255,255,255,0.2);
    font-size: 11px; letter-spacing: 3px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1;
    height: 1px; background: rgba(255,215,0,0.1);
  }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo-block">
    <div class="logo-ipl">IPL</div>
    <div class="logo-sub">Auction Arena</div>
    <div class="logo-year">SEASON 2024</div>
  </div>

  <div class="card">
    <h2>Enter the Arena</h2>

    <form method="POST">
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" name="username" placeholder="Enter your name" required>
      </div>

      <div class="divider">Select Role</div>

      <div class="role-grid">
        <div class="role-option">
          <input type="radio" name="role" id="admin" value="admin" required>
          <label class="role-label" for="admin">
            <span class="icon">🏏</span>
            <span class="role-name">Admin</span>
            <span class="role-desc">Control the auction</span>
          </label>
        </div>
        <div class="role-option">
          <input type="radio" name="role" id="client" value="client">
          <label class="role-label" for="client">
            <span class="icon">💰</span>
            <span class="role-name">Bidder</span>
            <span class="role-desc">Place your bids</span>
          </label>
        </div>
      </div>

      <button type="submit" class="btn-enter">Enter Auction</button>
    </form>
  </div>
</div>
</body>
</html>
