<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPL Auction Room</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:Poppins;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

header{
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:700;
    letter-spacing:1px;
    background:rgba(0,0,0,0.3);
}

.container{
    width:90%;
    margin:auto;
    margin-top:30px;
}

.search-box{
    background:white;
    padding:15px;
    border-radius:8px;
    margin-bottom:30px;
    text-align:center;
}

.search-box input{
    padding:10px;
    width:250px;
    border:none;
    border-radius:5px;
}

.search-box button{
    padding:10px 20px;
    border:none;
    background:#ff9800;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

.search-box button:hover{
    background:#ff6f00;
}

.live-room{
    background:#111;
    padding:20px;
    border-radius:10px;
    margin-bottom:40px;
}

.live-title{
    font-size:22px;
    margin-bottom:10px;
}

.bid-box{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.current-bid{
    font-size:26px;
    color:#4caf50;
}

.timer{
    color:#ff5252;
    font-size:18px;
}

.players{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:#1c1c1c;
    border-radius:12px;
    padding:20px;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px rgba(255,255,255,0.2);
}

.player-name{
    font-size:20px;
    font-weight:600;
}

.player-info{
    margin-top:8px;
    color:#bbb;
}

.price{
    margin-top:10px;
    font-size:18px;
    color:#ffeb3b;
}

.team{
    display:inline-block;
    margin-top:10px;
    padding:5px 10px;
    background:#2196f3;
    border-radius:5px;
    font-size:12px;
}

</style>

</head>

<body>

<header>
🏏 IPL LIVE AUCTION ROOM
</header>

<div class="container">

<!-- Search -->
<div class="search-box">
<form method="POST">
<input type="text" name="player_name" placeholder="Search player...">
<button type="submit">Search</button>
</form>
</div>

<!-- Live Auction -->
<div class="live-room">

<div class="live-title">
🔴 Live Auction
</div>

<div class="bid-box">

<div>
<div>Current Player</div>
<div style="font-size:20px;">{{ current_player }}</div>
</div>

<div>
<div>Current Bid</div>
<div class="current-bid">₹ {{ current_bid }} Cr</div>
</div>

<div class="timer">
⏳ 15s
</div>

</div>

</div>

<!-- Player Cards -->

<div class="players">

{% for p in players %}

<div class="card">

<div class="player-name">
{{ p.name }}
</div>

<div class="player-info">
Role: {{ p.role }}
</div>

<div class="player-info">
Country: {{ p.country }}
</div>

<div class="price">
Auction Price: ₹ {{ p.auction_price }} Cr
</div>

<div class="team">
{{ p.team }}
</div>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
